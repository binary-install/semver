name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Run tests
      run: go test -v ./...

    - name: Build binaries
      run: |
        # Build for multiple platforms
        GOOS=linux GOARCH=amd64 go build -o semver-linux-amd64 ./cmd/semver
        GOOS=linux GOARCH=arm64 go build -o semver-linux-arm64 ./cmd/semver
        GOOS=darwin GOARCH=amd64 go build -o semver-darwin-amd64 ./cmd/semver
        GOOS=darwin GOARCH=arm64 go build -o semver-darwin-arm64 ./cmd/semver
        GOOS=windows GOARCH=amd64 go build -o semver-windows-amd64.exe ./cmd/semver

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          semver-linux-amd64
          semver-linux-arm64
          semver-darwin-amd64
          semver-darwin-arm64
          semver-windows-amd64.exe
        generate_release_notes: true
